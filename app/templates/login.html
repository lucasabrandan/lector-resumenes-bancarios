<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;550;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-icon">
                <i data-lucide="book-open-text"></i>
            </div>
            <h1>Lector de Resumenes</h1>
            <p class="subtitle">Ingresa tus credenciales</p>
        </div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-field">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required autofocus placeholder="Tu usuario">
            </div>

            <div class="form-field">
                <label for="password">Contrasena</label>
                <input type="password" id="password" name="password" required placeholder="Tu contrasena">
            </div>

            <button type="submit">Iniciar Sesion</button>
        </form>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
